<body>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>

    <script>
        const url = 'https://dog.ceo/api/breeds/image/random';
        async function get() {
            const config = { headers: { Accept: "application/json" } };

        }
        get()
    </script>
