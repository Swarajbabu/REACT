<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function getNum() {
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    let ran = Math.floor(Math.random()*10)+1
                    console.log(ran);
                    resolve(ran);
                },1000)
            })
        }
        // becaue of await the code will wait for the promise to resolve before going to the next line of code
        // the values will be printed after 1 second because of the setTimeout function
        Demo = async () =>{
            await getNum()
            await getNum()
            await getNum()
            await getNum()
        }
        Demo()
    </script>
</body>

</html>
